<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#0a0a0b">

  <!-- Primary Meta Tags -->
  <title>Threatbase — Real-Time Threat Intelligence & IOC Blocklists</title>
  <meta name="description"
    content="Threatbase is an open-source threat intelligence platform tracking malicious infrastructure globally. Access real-time IOC feeds, IP blocklists, and community-driven threat reports.">
  <meta name="keywords"
    content="threat intelligence, IOC, indicators of compromise, IP blocklist, malware, phishing, cybersecurity, threat feeds, open source intelligence, OSINT, infosec, DDoS, botnet, brute force">
  <meta name="author" content="Threatbase">
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://threatbase.qzz.io/">

  <!-- Favicon -->
  <link rel="icon" href="/img/threatbase.png" type="image/png">
  <link rel="apple-touch-icon" href="/img/threatbase.png">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://threatbase.qzz.io/">
  <meta property="og:title" content="Threatbase — Real-Time Threat Intelligence & IOC Blocklists">
  <meta property="og:description"
    content="Community-driven threat intelligence platform. Access real-time IOC feeds, scan IPs & domains, and deploy high-performance blocklists.">
  <meta property="og:image" content="https://threatbase.qzz.io/img/threatbase.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:site_name" content="Threatbase">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://threatbase.qzz.io/">
  <meta name="twitter:title" content="Threatbase — Real-Time Threat Intelligence & IOC Blocklists">
  <meta name="twitter:description"
    content="Open-source threat intelligence platform. Scan IPs, access IOC feeds, and deploy blocklists in real time.">
  <meta name="twitter:image" content="https://threatbase.qzz.io/img/threatbase.png">

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Threatbase",
    "url": "https://threatbase.qzz.io",
    "description": "Community-driven threat intelligence platform providing real-time IOC feeds, IP scanning, and high-performance blocklists for cybersecurity defenders.",
    "applicationCategory": "SecurityApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "creator": {
      "@type": "Organization",
      "name": "Threatbase",
      "url": "https://threatbase.qzz.io"
    },
    "featureList": [
      "Real-time threat intelligence feeds",
      "IP and domain scanning",
      "Community-driven IOC reports",
      "High-performance blocklists",
      "Threat analytics dashboard"
    ]
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
