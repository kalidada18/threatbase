name: HimalayaFeed — Update Threat Intelligence Feed

on:
  # ── Automatic: every 2 hours at minute 0 ──────────────────────────────────
  schedule:
    - cron: '0 */2 * * *'

  # ── Re-enable schedule whenever code is pushed to main ────────────────────
  push:
    branches: [main]

  # ── Manual: trigger from the Actions tab any time ─────────────────────────
  workflow_dispatch:

# Prevent concurrent runs from racing on the same git push.
# A new run queued while one is already active will wait, not cancel.
concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  update-feed:
    name: Fetch, Aggregate & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Optimized script completes in ~90s; 10min buffer for slow networks

    # Required so the built-in GITHUB_TOKEN can push commits back to the repo.
    # No PAT or extra secrets are needed.
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Ensure we have the full history for accurate diff detection
          fetch-depth: 1

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install --quiet --no-cache-dir -r requirements.txt

      # ── 4. Process Uploaded ZIPs (MalwareBazaar) ─────────────────────────────
      - name: Extract Hashes from ZIPs
        run: |
          for zip in *.zip; do
            if [ -f "$zip" ]; then
              echo "Extracting hashes from $zip..."
              echo "" >> custom_iocs.txt
              echo "[hashes]" >> custom_iocs.txt
              echo "# Extracted from $zip on $(date -u)" >> custom_iocs.txt
              unzip -p "$zip" | grep -oE '\b([a-fA-F0-9]{32}|[a-fA-F0-9]{40}|[a-fA-F0-9]{64})\b' | tr '[:upper:]' '[:lower:]' | sort -u >> custom_iocs.txt
              git rm "$zip" || rm "$zip"
            fi
          done

      # ── 5. Run the aggregator ────────────────────────────────────────────────
      - name: Run feed aggregator
        env:
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
          PYTHONUNBUFFERED: '1'
        run: python update_feed.py

      # ── 5. Commit and push ───────────────────────────────────────────────────
      #
      # Uses the official github-actions[bot] identity so commit history is clean.
      # The GITHUB_TOKEN has contents:write permission granted above.
      # GitHub itself prevents this push from re-triggering the same workflow,
      # so there is no risk of an infinite loop.
      - name: Commit and push updated feed files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage all generated output files (including dashboard data)
          git add malicious_ips.txt stats.json history.json malicious_domains.txt malicious_hashes.txt malicious_urls.txt

          # Check whether any staged file actually changed
          if git diff --staged --quiet; then
            echo "✓ No changes detected — feed is already up-to-date. Skipping commit."
          else
            # Count non-comment IP and domain lines for a meaningful commit message
            IP_COUNT=$(grep -cE '^[0-9]' malicious_ips.txt 2>/dev/null || echo "0")
            DOMAIN_COUNT=$(grep -cvE '^$|^#' malicious_domains.txt 2>/dev/null || echo "0")
            HASH_COUNT=$(wc -l < malicious_hashes.txt 2>/dev/null || echo "0")
            URL_COUNT=$(wc -l < malicious_urls.txt 2>/dev/null || echo "0")
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "Update: ${TIMESTAMP} — ${IP_COUNT} IPs, ${DOMAIN_COUNT} domains, ${HASH_COUNT} hashes, ${URL_COUNT} URLs"

            git pull --rebase --autostash --quiet origin "${GITHUB_REF_NAME:-main}" || true
            git push origin "${GITHUB_REF_NAME:-main}"
            echo "✓ Feed pushed successfully (${IP_COUNT} IPs, ${DOMAIN_COUNT} Domains, ${HASH_COUNT} Hashes, ${URL_COUNT} URLs)."
          fi

      # ── 6. Create Daily Archive Release ───────────────────────────────────────
      - name: Set Archive Date & Prepare Zip
        run: |
          DATE_DASH=$(date -u +'%Y-%m-%d')
          DATE_DOT=$(date -u +'%Y.%m.%d')
          echo "ARCHIVE_DATE=${DATE_DASH}" >> $GITHUB_ENV
          zip himalayafeed-archive-${DATE_DOT}.zip malicious_ips.txt malicious_domains.txt malicious_hashes.txt malicious_urls.txt

      - name: Create Daily Archive Release
        uses: ncipollo/release-action@v1
        with:
          tag: archive-${{ env.ARCHIVE_DATE }}
          name: Daily Feed Archive - ${{ env.ARCHIVE_DATE }}
          artifacts: "malicious_ips.txt,malicious_domains.txt,malicious_hashes.txt,malicious_urls.txt,stats.json,himalayafeed-archive-*.zip"
          allowUpdates: true
          replacesArtifacts: true
          body: "Automated daily archive of the HimalayaFeed threat intelligence database."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
