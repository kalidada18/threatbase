name: Threatbase — Update Threat Intelligence Feed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # ── Automated: run every hour ─────────────────────────────────────────────
  schedule:
    - cron: '0 * * * *'
  # ── Manual: trigger from the Actions tab any time ─────────────────────────
  workflow_dispatch:

# Prevent concurrent runs from racing on the same git push.
# A new run queued while one is already active will wait, not cancel.
concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  update-feed:
    name: Fetch, Aggregate & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Optimized script completes in ~90s; 10min buffer for slow networks

    # Required so the built-in GITHUB_TOKEN can push commits back to the repo.
    # No PAT or extra secrets are needed.
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Ensure we have the full history for accurate diff detection
          fetch-depth: 1

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install --quiet --no-cache-dir -r requirements.txt

      # ── 4. Process Uploaded ZIPs (MalwareBazaar) ─────────────────────────────
      - name: Extract Hashes from ZIPs
        run: |
          for zip in *.zip; do
            if [ -f "$zip" ]; then
              echo "Extracting hashes from $zip..."
              echo "" >> custom_iocs.txt
              echo "[hashes]" >> custom_iocs.txt
              echo "# Extracted from $zip on $(date -u)" >> custom_iocs.txt
              unzip -p "$zip" | grep -oE '\b([a-fA-F0-9]{32}|[a-fA-F0-9]{40}|[a-fA-F0-9]{64})\b' | tr '[:upper:]' '[:lower:]' | sort -u >> custom_iocs.txt
              git rm "$zip" || rm "$zip"
            fi
          done

      # ── 4.5 Sync Community Reports from Supabase ────────────────────────────
      - name: Sync community-reported IPs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_SERVICE_KEY" ]; then
            python sync_community_reports.py
          else
            echo "⚠ Supabase secrets not configured — skipping community sync"
          fi

      # ── 5. Run the aggregator ────────────────────────────────────────────────
      - name: Run feed aggregator
        env:
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          PYTHONUNBUFFERED: '1'
        run: python update_feed.py

      # ── 6. Commit and push ───────────────────────────────────────────────────
      #
      # Uses the official github-actions[bot] identity so commit history is clean.
      # The GITHUB_TOKEN has contents:write permission granted above.
      # GitHub itself prevents this push from re-triggering the same workflow,
      # so there is no risk of an infinite loop.
      - name: Commit and push updated feed files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage all generated output files (including dashboard data + community reports)
          git add ioc/malicious_ips.txt ioc/malicious_ipv6.txt ioc/malicious_cidrs.txt ioc/stats.json ioc/history.json ioc/malicious_domains.txt ioc/malicious_hashes.txt ioc/malicious_urls.txt
          git add -f ioc/community_reports.json 2>/dev/null || true
          git add -f custom_iocs.txt 2>/dev/null || true

          # Check whether any staged file actually changed
          if git diff --staged --quiet; then
            echo "✓ No changes detected — feed is already up-to-date. Skipping commit."
          else
            # Get current counts
            IP_COUNT=$(grep -cE '^[0-9]' ioc/malicious_ips.txt 2>/dev/null || echo "0")
            IPV6_COUNT=$(grep -cvE '^$|^#' ioc/malicious_ipv6.txt 2>/dev/null || echo "0")
            CIDR_COUNT=$(grep -cvE '^$|^#' ioc/malicious_cidrs.txt 2>/dev/null || echo "0")
            DOMAIN_COUNT=$(grep -cvE '^$|^#' ioc/malicious_domains.txt 2>/dev/null || echo "0")
            HASH_COUNT=$(wc -l < ioc/malicious_hashes.txt 2>/dev/null || echo "0")
            URL_COUNT=$(wc -l < ioc/malicious_urls.txt 2>/dev/null || echo "0")
            
            # Get previous counts from HEAD
            PREV_IP=$(git show HEAD:ioc/malicious_ips.txt 2>/dev/null | grep -cE '^[0-9]' || echo "0")
            PREV_IPV6=$(git show HEAD:ioc/malicious_ipv6.txt 2>/dev/null | grep -cvE '^$|^#' || echo "0")
            PREV_CIDR=$(git show HEAD:ioc/malicious_cidrs.txt 2>/dev/null | grep -cvE '^$|^#' || echo "0")
            PREV_DOMAIN=$(git show HEAD:ioc/malicious_domains.txt 2>/dev/null | grep -cvE '^$|^#' || echo "0")
            PREV_HASH=$(git show HEAD:ioc/malicious_hashes.txt 2>/dev/null | wc -l || echo "0")
            PREV_URL=$(git show HEAD:ioc/malicious_urls.txt 2>/dev/null | wc -l || echo "0")
            
            # Calculate deltas
            fmt_diff() {
              if [ "$1" -gt 0 ]; then echo "+$1"; else echo "$1"; fi
            }
            D_IP=$(fmt_diff $((IP_COUNT - PREV_IP)))
            D_IPV6=$(fmt_diff $((IPV6_COUNT - PREV_IPV6)))
            D_CIDR=$(fmt_diff $((CIDR_COUNT - PREV_CIDR)))
            D_DOMAIN=$(fmt_diff $((DOMAIN_COUNT - PREV_DOMAIN)))
            D_HASH=$(fmt_diff $((HASH_COUNT - PREV_HASH)))
            D_URL=$(fmt_diff $((URL_COUNT - PREV_URL)))

            # Format timestamp in Nepal Time (NPT/NTP)
            TIMESTAMP=$(TZ='Asia/Kathmandu' date '+%Y-%m-%d %I:%M %p NPT')
            
            git commit -m "Update: ${TIMESTAMP} — Added ${D_IP} IPs, ${D_IPV6} IPv6, ${D_CIDR} CIDRs, ${D_DOMAIN} Domains, ${D_HASH} Hashes, ${D_URL} URLs" -m "Total: ${IP_COUNT} IPs, ${IPV6_COUNT} IPv6, ${CIDR_COUNT} CIDRs, ${DOMAIN_COUNT} domains, ${HASH_COUNT} hashes, ${URL_COUNT} URLs"

            # Pull with rebase, resolving conflicts by preferring our freshly generated files ('theirs' during rebase)
            git pull --rebase -X theirs --autostash --quiet origin "${GITHUB_REF_NAME:-main}"
            git push origin "${GITHUB_REF_NAME:-main}"
            echo "✓ Feed pushed successfully (${IP_COUNT} IPs, ${DOMAIN_COUNT} Domains, ${HASH_COUNT} Hashes, ${URL_COUNT} URLs)."
          fi

      # ── 6. Create Daily Archive Release ───────────────────────────────────────
      - name: Set Archive Date & Prepare Zip
        run: |
          DATE_DASH=$(date -u +'%Y-%m-%d')
          DATE_DOT=$(date -u +'%Y.%m.%d')
          echo "ARCHIVE_DATE=${DATE_DASH}" >> $GITHUB_ENV
          zip -j threatbase-archive-${DATE_DOT}.zip ioc/malicious_ips.txt ioc/malicious_ipv6.txt ioc/malicious_cidrs.txt ioc/malicious_domains.txt ioc/malicious_hashes.txt ioc/malicious_urls.txt

      - name: Create Daily Archive Release
        uses: ncipollo/release-action@v1
        with:
          tag: archive-${{ env.ARCHIVE_DATE }}
          name: Daily Feed Archive - ${{ env.ARCHIVE_DATE }}
          artifacts: "ioc/malicious_ips.txt,ioc/malicious_ipv6.txt,ioc/malicious_cidrs.txt,ioc/malicious_domains.txt,ioc/malicious_hashes.txt,ioc/malicious_urls.txt,ioc/stats.json,threatbase-archive-*.zip"
          allowUpdates: true
          replacesArtifacts: true
          body: "Automated daily archive of the Threatbase threat intelligence database."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


